<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monde Live — Films E & Coupe du Monde</title>
<style>
  :root {
    --ink: #0a0e27;
    --ink-2: #141a3a;
    --panel: #1a2145;
    --line: #2e3870;
    --text: #e8ebff;
    --muted: #9aa3d4;
    --gold: #e8b647;
    --live: #ff4d5e;
    --match: #4fb286;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.45;
    min-height: 100vh;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 20px 80px; }
  header {
    background: linear-gradient(180deg, var(--ink-2), var(--ink));
    border-bottom: 1px solid var(--line);
    padding: 28px 0 24px;
  }
  .brand h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .brand h1 .dot { color: var(--gold); }
  .tag { color: var(--muted); font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 8px; }

  .controls { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
  .controls button {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .controls button.active { background: var(--gold); color: var(--ink); font-weight: 600; }
  .controls button:hover { border-color: var(--gold); }

  .search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
  input[type="search"] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }

  .meta { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .meta strong { color: var(--text); }

  .section { margin-bottom: 32px; }
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

  .items { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .item {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 14px;
    transition: all 0.12s;
  }
  .item:hover { border-color: var(--gold); background: var(--panel-2, #232c5a); }
  .item.live { border-color: var(--live); background: rgba(255,77,94,0.07); }
  .item.match { border-left: 4px solid var(--match); }

  .item-header { display: flex; align-items: start; gap: 8px; margin-bottom: 8px; }
  .item-flag { font-size: 24px; flex-shrink: 0; }
  .item-country { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .item-title { font-weight: 600; font-size: 15px; word-break: break-word; }
  .item-time { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .item-live-badge { display: inline-block; background: var(--live); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-top: 6px; }
  .item-match { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px; font-size: 14px; font-weight: 600; }
  .item-match .team { flex: 1; text-align: center; }
  .item-match .vs { color: var(--muted); padding: 0 4px; }
  .item-match .score { color: var(--match); margin-top: 4px; }

  .state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 720px) {
    .items { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <h1>Monde<span class="dot">.</span>Live</h1>
      <div class="tag">🎬 Films E • ⚽ Coupe du Monde</div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="controls">
    <button class="filter-btn active" data-filter="all">Tous</button>
    <button class="filter-btn" data-filter="erotica">🎬 Films E</button>
    <button class="filter-btn" data-filter="worldcup">⚽ Coupe du Monde</button>
  </div>

  <div class="search-bar">
    <input type="search" id="search" placeholder="Rechercher programme, pays, équipe..." autocomplete="off" />
  </div>

  <div class="meta" id="meta"></div>

  <div id="content">
    <div class="state"><div class="spinner"></div>Chargement mondial…</div>
  </div>
</body>

<script>
const state = {
  data: null,
  filter: "all",
  search: "",
};

const filters = document.querySelectorAll(".filter-btn");
filters.forEach(btn => {
  btn.addEventListener("click", (e) => {
    filters.forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    state.filter = e.target.dataset.filter;
    render();
  });
});

const searchInput = document.getElementById("search");
searchInput.addEventListener("input", (e) => {
  state.search = e.target.value.toLowerCase();
  setTimeout(render, 120);
});

async function load() {
  try {
    const res = await fetch("/api/monde-live");
    if (!res.ok) throw new Error(`Erreur ${res.status}`);
    state.data = await res.json();
    render();
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="state">Impossible de charger les données.<br><button onclick="location.reload()">Réessayer</button></div>`;
  }
}

function render() {
  if (!state.data) return;

  const q = state.search;
  let programmes = state.data.programmes || [];
  let matches = state.data.worldcupMatches || [];

  // Filtre programmes
  if (state.filter === "erotica") {
    programmes = programmes.filter(p => 
      (p.title.toLowerCase().includes(q) || 
       p.countryName.toLowerCase().includes(q) || 
       p.channel.toLowerCase().includes(q))
    );
  }

  // Filtre matchs
  if (state.filter === "worldcup") {
    matches = matches.filter(m => 
      (m.homeTeam.toLowerCase().includes(q) || 
       m.awayTeam.toLowerCase().includes(q))
    );
  }

  // Affichage
  let html = "";

  if (state.filter !== "worldcup") {
    const total = state.data.programmes.length;
    const displayed = programmes.length;
    html += `<div class="section">
      <div class="section-title">🎬 Films E à l'Antenne</div>
      <div class="meta"><strong>${displayed}</strong> diffusions actuelles sur <strong>${total}</strong> monde</div>`;
    
    if (programmes.length === 0) {
      html += `<div class="state">Aucun film érotique en direct maintenant.</div>`;
    } else {
      html += `<div class="items">`;
      programmes.forEach(p => {
        html += `<div class="item live">
          <div class="item-header">
            <span class="item-flag">${p.flag}</span>
            <div>
              <div class="item-country">${p.countryName}</div>
              <div class="item-title">${esc(p.title)}</div>
            </div>
          </div>
          <div class="item-time">${new Date(p.start).toLocaleTimeString("fr-FR", {hour: "2-digit", minute: "2-digit"})}</div>
          <span class="item-live-badge">EN DIRECT</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  if (state.filter !== "erotica") {
    html += `<div class="section">
      <div class="section-title">⚽ Coupe du Monde 2026 — LIVE</div>`;
    
    if (matches.length === 0) {
      html += `<div class="state">Aucun match en direct maintenant.</div>`;
    } else {
      html += `<div class="items">`;
      matches.forEach(m => {
        html += `<div class="item match live">
          <div class="item-match">
            <span class="team">${esc(m.homeTeam)}</span>
            <span class="vs">vs</span>
            <span class="team">${esc(m.awayTeam)}</span>
          </div>
          <div class="item-match score">${m.score}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById("content").innerHTML = html;
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

load();
setInterval(load, 300000); // Mise à jour toutes les 5 min
</script>
</html>
