<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monde Live</title>
<style>
:root {
  --ink: #0a0e27;
  --ink-2: #141a3a;
  --panel: #1a2145;
  --line: #2e3870;
  --text: #e8ebff;
  --muted: #9aa3d4;
  --gold: #e8b647;
  --live: #ff4d5e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 20px 80px; }
header { background: linear-gradient(180deg, var(--ink-2), var(--ink)); border-bottom: 1px solid var(--line); padding: 28px 0 24px; }
h1 { font-size: 48px; font-weight: 800; }
.dot { color: var(--gold); }
.tag { color: var(--muted); font-size: 12px; text-transform: uppercase; margin-top: 8px; }
.country-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; max-height: 500px; overflow-y: auto; padding: 20px; background: var(--panel); border-radius: 9px; margin: 20px 0; }
.country-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px; border-radius: 8px; background: var(--ink); border: 1px solid var(--line); cursor: pointer; transition: all 0.12s; user-select: none; }
.country-item:hover { border-color: var(--gold); }
.country-item.selected { background: var(--gold); color: var(--ink); font-weight: 600; }
.country-flag { font-size: 32px; }
.country-name { font-size: 10px; text-align: center; word-break: break-word; }
.actions { display: flex; gap: 12px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
.actions button { border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
.actions .submit { background: var(--gold); color: var(--ink); }
.actions .cancel { background: var(--panel); color: var(--text); border: 1px solid var(--line); }
.items { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.item { background: var(--panel); border: 1px solid var(--live); border-radius: 9px; padding: 14px; }
.item-flag { font-size: 24px; }
.item-country { font-size: 11px; color: var(--muted); text-transform: uppercase; }
.item-title { font-weight: 600; margin-top: 4px; }
.item-time { font-size: 12px; color: var(--muted); margin-top: 4px; }
.item-badge { display: inline-block; background: var(--live); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-top: 6px; }
.state { text-align: center; padding: 60px 20px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none; }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Monde<span class="dot">.</span>Live</h1>
    <div class="tag">🎬 Films E</div>
  </div>
</header>

<div class="wrap" id="app"></div>

<script>
const state = { countries: [], selectedCountries: [], data: null, stage: "select" };

async function init() {
  try {
    const res = await fetch("/api/monde-live");
    const data = await res.json();
    state.countries = data.countries || [];
    renderSelector();
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="state">❌ Erreur chargement</div>`;
  }
}

function renderSelector() {
  let html = `
    <h2 style="margin-bottom: 20px;">Sélectionne les pays</h2>
    <div class="country-grid" id="grid">`;
  state.countries.forEach(c => {
    html += `<div class="country-item" data-code="${c.code}">
      <span class="country-flag">${c.flag}</span>
      <span class="country-name">${c.name}</span>
    </div>`;
  });
  html += `</div>
    <div class="actions">
      <button class="submit" onclick="submitSelection()">Charger</button>
      <button class="cancel" onclick="selectAll()">Tous</button>
      <button class="cancel" onclick="clearSelection()">Réinitialiser</button>
    </div>`;
  
  document.getElementById("app").innerHTML = html;
  
  document.querySelectorAll(".country-item").forEach(el => {
    el.addEventListener("click", () => {
      const code = el.dataset.code;
      if (state.selectedCountries.includes(code)) {
        state.selectedCountries = state.selectedCountries.filter(c => c !== code);
        el.classList.remove("selected");
      } else {
        state.selectedCountries.push(code);
        el.classList.add("selected");
      }
    });
  });
}

function selectAll() {
  state.selectedCountries = state.countries.map(c => c.code);
  document.querySelectorAll(".country-item").forEach(el => el.classList.add("selected"));
}

function clearSelection() {
  state.selectedCountries = [];
  document.querySelectorAll(".country-item").forEach(el => el.classList.remove("selected"));
}

async function submitSelection() {
  if (!state.selectedCountries.length) return alert("Sélectionne au least un pays");
  
  document.getElementById("app").innerHTML = `<div class="state"><div class="spinner"></div>Chargement…</div>`;
  
  try {
    const res = await fetch(`/api/monde-live?countries=${state.selectedCountries.join(",")}`);
    const data = await res.json();
    state.data = data;
    state.stage = "results";
    renderResults();
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="state">❌ Erreur</div>`;
  }
}

function renderResults() {
  const progs = state.data?.programmes || [];
  let html = `
    <button class="cancel" onclick="goBack()" style="margin-bottom: 20px;">← Retour</button>
    <h2 style="margin-bottom: 10px;">🎬 Films E à l'Antenne</h2>
    <p style="color: var(--muted); margin-bottom: 20px;"><strong>${progs.length}</strong> diffusions</p>`;
  
  if (!progs.length) {
    html += `<div class="state">Aucun film érotique en ce moment</div>`;
  } else {
    html += `<div class="items">`;
    progs.forEach(p => {
      const time = new Date(p.start).toLocaleTimeString("fr-FR", {hour: "2-digit", minute: "2-digit"});
      html += `<div class="item">
        <div style="display: flex; gap: 8px;">
          <span class="item-flag">${p.flag}</span>
          <div>
            <div class="item-country">${p.countryName}</div>
            <div class="item-title">${p.title}</div>
          </div>
        </div>
        <div class="item-time">${time}</div>
        <span class="item-badge">EN DIRECT</span>
      </div>`;
    });
    html += `</div>`;
  }
  
  document.getElementById("app").innerHTML = html;
}

function goBack() {
  state.stage = "select";
  renderSelector();
}

init();
</script>
</body>
</html>
