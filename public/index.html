<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monde Live</title>
<style>
:root {
  --ink: #0a0e27;
  --ink-2: #141a3a;
  --panel: #1a2145;
  --line: #2e3870;
  --text: #e8ebff;
  --muted: #9aa3d4;
  --gold: #e8b647;
  --live: #ff4d5e;
  --match: #4fb286;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 20px 80px; }
header { background: linear-gradient(180deg, var(--ink-2), var(--ink)); border-bottom: 1px solid var(--line); padding: 28px 0 24px; }
h1 { font-size: 48px; font-weight: 800; }
.dot { color: var(--gold); }
.tag { color: var(--muted); font-size: 12px; text-transform: uppercase; margin-top: 8px; }

.continent { margin-bottom: 24px; }
.continent-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--panel); border-radius: 9px 9px 0 0;
  cursor: pointer; user-select: none; border: 1px solid var(--line);
}
.continent-header:hover { border-color: var(--gold); }
.continent-icon { font-size: 24px; }
.continent-name { font-weight: 700; font-size: 16px; flex: 1; }
.continent-count { font-size: 12px; color: var(--muted); }
.continent-toggle { color: var(--gold); font-size: 14px; }
.continent-body { 
  display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 10px; padding: 16px; background: var(--ink-2); 
  border-left: 1px solid var(--line); border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line); border-radius: 0 0 9px 9px;
}
.continent.collapsed .continent-body { display: none; }
.continent.collapsed .continent-toggle::after { content: " ▼"; }
.continent:not(.collapsed) .continent-toggle::after { content: " ▲"; }

.country-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 12px; border-radius: 8px;
  background: var(--ink); border: 1px solid var(--line);
  cursor: pointer; transition: all 0.12s; user-select: none;
}
.country-item:hover { border-color: var(--gold); }
.country-item.selected { background: var(--gold); color: var(--ink); font-weight: 600; }
.country-flag { font-size: 28px; }
.country-name { font-size: 10px; text-align: center; word-break: break-word; }

.actions { 
  display: flex; gap: 12px; margin: 20px 0; justify-content: center; 
  flex-wrap: wrap; position: sticky; bottom: 20px;
  background: var(--ink); padding: 12px; border-radius: 9px;
  border: 1px solid var(--line);
  z-index: 10;
}
.actions button { border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
.actions .submit { background: var(--gold); color: var(--ink); }
.actions .cancel { background: var(--panel); color: var(--text); border: 1px solid var(--line); }
.actions .submit:disabled { opacity: 0.5; cursor: not-allowed; }

.controls { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
.controls button { background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; }
.controls button.active { background: var(--gold); color: var(--ink); font-weight: 600; }

.items { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.item { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 14px; transition: all 0.12s; }
.item.erotica { border-color: #ff69b4; }
.item.worldcup { border-color: var(--match); border-left: 4px solid var(--match); }
.item-header { display: flex; gap: 8px; margin-bottom: 8px; align-items: start; }
.item-flag { font-size: 24px; flex-shrink: 0; }
.item-info { flex: 1; }
.item-country { font-size: 11px; color: var(--muted); text-transform: uppercase; }
.item-title { font-weight: 600; margin-top: 4px; font-size: 15px; }
.item-channel { font-size: 12px; color: var(--gold); margin-top: 4px; font-weight: 600; }
.item-time { font-size: 12px; color: var(--muted); margin-top: 4px; }
.item-badge { display: inline-block; background: var(--live); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-top: 6px; }
.item-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.item-actions button {
  background: var(--gold); color: var(--ink); border: none;
  padding: 6px 12px; border-radius: 6px; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all 0.12s;
}
.item-actions button:hover { opacity: 0.9; }
.item-actions button.no-stream { background: var(--panel); color: var(--muted); cursor: not-allowed; border: 1px solid var(--line); }
.item-actions .copy-btn { background: var(--panel); color: var(--text); border: 1px solid var(--line); }
.state { text-align: center; padding: 60px 20px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
h2 { font-size: 20px; margin: 20px 0 10px; }
.subtitle { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
.summary { background: var(--panel); padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--gold); }
.summary strong { color: var(--gold); }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Monde<span class="dot">.</span>Live</h1>
    <div class="tag">🎬 Films Érotiques • ⚽ Coupe du Monde</div>
  </div>
</header>

<div class="wrap" id="app"></div>

<script>
const state = { countries: [], selectedCountries: [], data: null, stage: "select", filter: "all" };

// Organisation par continents
const CONTINENTS = {
  europe: {
    icon: "🌍", name: "Europe",
    codes: ["fr", "gb", "es", "it", "de", "be", "ch", "pl", "nl", "at", "cz", "dk", "fi", "se", "no", "pt", "gr", "hu", "ro", "bg", "sk", "si", "hr", "ba", "rs", "me", "ua", "by", "ie", "is", "al", "ad", "ee", "lv", "lt", "lu", "mt", "md", "mc", "sm", "xk", "li"]
  },
  asia: {
    icon: "🌏", name: "Asie",
    codes: ["ru", "tr", "kz", "uz", "tm", "tj", "kg", "ge", "am", "az", "af", "bd", "bt", "in", "lk", "mv", "np", "pk", "jp", "kr", "cn", "th", "my", "sg", "id", "ph", "vn", "sa", "ae", "il"]
  },
  africa: {
    icon: "🌍", name: "Afrique",
    codes: ["eg", "ng", "za", "ke", "mu", "sc"]
  },
  americas: {
    icon: "🌎", name: "Amériques",
    codes: ["us", "ca", "mx", "br", "ar", "cl", "co", "pe", "ve", "ec", "gy", "py", "sr", "uy", "bz", "cr", "sv", "gt", "hn", "ni", "pa", "jm", "tt", "bs", "dm", "pr", "ag", "bb", "gd"]
  },
  oceania: {
    icon: "🌏", name: "Océanie",
    codes: ["au", "nz", "fj", "pf", "sb", "vu"]
  }
};

async function init() {
  try {
    const res = await fetch("/api/monde-live");
    const data = await res.json();
    state.countries = data.countries || [];
    renderSelector();
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="state">❌ Erreur chargement</div>`;
  }
}

function getCountryByCode(code) {
  return state.countries.find(c => c.code === code);
}

function renderSelector() {
  let html = `
    <h2>🌍 Sélectionne les pays</h2>
    <p class="subtitle">Choisis 1 ou plusieurs pays pour voir les films érotiques et matchs en direct</p>`;
  
  // Compteur de sélection
  if (state.selectedCountries.length > 0) {
    html += `<div class="summary"><strong>${state.selectedCountries.length}</strong> pays sélectionné(s)</div>`;
  }
  
  // Affichage par continent
  for (const [contKey, cont] of Object.entries(CONTINENTS)) {
    const continentCountries = cont.codes
      .map(code => getCountryByCode(code))
      .filter(c => c !== undefined);
    
    if (continentCountries.length === 0) continue;
    
    const isCollapsed = false; // Tous ouverts par défaut
    const selectedInCont = continentCountries.filter(c => state.selectedCountries.includes(c.code)).length;
    
    html += `<div class="continent ${isCollapsed ? 'collapsed' : ''}" data-continent="${contKey}">
      <div class="continent-header" onclick="toggleContinent('${contKey}')">
        <span class="continent-icon">${cont.icon}</span>
        <span class="continent-name">${cont.name}</span>
        <span class="continent-count">${selectedInCont}/${continentCountries.length} pays</span>
        <button onclick="event.stopPropagation(); selectContinent('${contKey}')" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;">Tout sélectionner</button>
        <button onclick="event.stopPropagation(); deselectContinent('${contKey}')" style="background: transparent; border: 1px solid var(--muted); color: var(--muted); padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;">Désélectionner</button>
        <span class="continent-toggle"></span>
      </div>
      <div class="continent-body">`;
    
    continentCountries.forEach(c => {
      const isSelected = state.selectedCountries.includes(c.code);
      html += `<div class="country-item ${isSelected ? 'selected' : ''}" data-code="${c.code}" onclick="toggleCountry('${c.code}')">
        <span class="country-flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
      </div>`;
    });
    
    html += `</div></div>`;
  }
  
  html += `
    <div class="actions">
      <button class="submit" onclick="submitSelection()" ${state.selectedCountries.length === 0 ? 'disabled' : ''}>
        Charger les données (${state.selectedCountries.length})
      </button>
      <button class="cancel" onclick="selectAll()">Tous les pays</button>
      <button class="cancel" onclick="clearSelection()">Réinitialiser</button>
    </div>`;
  
  document.getElementById("app").innerHTML = html;
}

function toggleCountry(code) {
  if (state.selectedCountries.includes(code)) {
    state.selectedCountries = state.selectedCountries.filter(c => c !== code);
  } else {
    state.selectedCountries.push(code);
  }
  renderSelector();
}

function toggleContinent(contKey) {
  const el = document.querySelector(`.continent[data-continent="${contKey}"]`);
  if (el) el.classList.toggle("collapsed");
}

function selectContinent(contKey) {
  const cont = CONTINENTS[contKey];
  cont.codes.forEach(code => {
    if (state.countries.find(c => c.code === code) && !state.selectedCountries.includes(code)) {
      state.selectedCountries.push(code);
    }
  });
  renderSelector();
}

function deselectContinent(contKey) {
  const cont = CONTINENTS[contKey];
  state.selectedCountries = state.selectedCountries.filter(c => !cont.codes.includes(c));
  renderSelector();
}

function selectAll() {
  state.selectedCountries = state.countries.map(c => c.code);
  renderSelector();
}

function clearSelection() {
  state.selectedCountries = [];
  renderSelector();
}

async function submitSelection() {
  if (!state.selectedCountries.length) return alert("Sélectionne au moins un pays");
  
  document.getElementById("app").innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <p style="font-size: 16px; margin-bottom: 12px;">Chargement de ${state.selectedCountries.length} pays…</p>
      <p style="color: var(--muted); font-size: 13px;">Cela peut prendre 30-60 secondes pour de nombreux pays.<br>Patience, on charge en parallèle ⚡</p>
    </div>`;
  
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000); // 60s timeout
    
    const res = await fetch(`/api/monde-live?countries=${state.selectedCountries.join(",")}`, {
      signal: controller.signal
    });
    clearTimeout(timeout);
    
    if (!res.ok) throw new Error(`Erreur ${res.status}`);
    
    const data = await res.json();
    state.data = data;
    state.stage = "results";
    renderResults();
  } catch (e) {
    const isTimeout = e.name === "AbortError";
    document.getElementById("app").innerHTML = `
      <div class="state">
        <p style="color: var(--live); font-size: 18px; margin-bottom: 12px;">❌ ${isTimeout ? 'Timeout - Trop de pays sélectionnés' : 'Erreur de chargement'}</p>
        <p style="color: var(--muted); margin-bottom: 20px;">${isTimeout ? 'Essaye avec moins de pays (max 15-20 à la fois)' : 'Vérifie ta connexion et réessaye'}</p>
        <button class="cancel" onclick="goBack()">← Retour à la sélection</button>
      </div>`;
  }
}

function renderResults() {
  const erotica = state.data?.erotica || [];
  const worldcup = state.data?.worldcup || [];
  
  let html = `
    <button class="cancel" onclick="goBack()" style="margin-bottom: 20px;">← Retour à la sélection</button>
    
    <div class="summary">
      <strong>${state.selectedCountries.length}</strong> pays | 
      <strong>${erotica.length}</strong> films érotiques | 
      <strong>${worldcup.length}</strong> matchs Coupe du Monde
    </div>
    
    <div class="controls">
      <button class="filter-btn ${state.filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">Tous</button>
      <button class="filter-btn ${state.filter === 'erotica' ? 'active' : ''}" onclick="setFilter('erotica')">🎬 Films Érotiques (${erotica.length})</button>
      <button class="filter-btn ${state.filter === 'worldcup' ? 'active' : ''}" onclick="setFilter('worldcup')">⚽ Coupe du Monde (${worldcup.length})</button>
    </div>`;
  
  if (state.filter === "all" || state.filter === "erotica") {
    html += `<h2>🎬 Films Érotiques à l'Antenne</h2>
      <p class="subtitle"><strong>${erotica.length}</strong> diffusion(s) maintenant</p>`;
    
    if (!erotica.length) {
      html += `<div class="state">Aucun film érotique en ce moment</div>`;
    } else {
      html += `<div class="items">`;
      erotica.forEach((p, idx) => {
        const time = new Date(p.start).toLocaleTimeString("fr-FR", {hour: "2-digit", minute: "2-digit"});
        const streamActions = p.streamUrl 
          ? `<div class="item-actions">
              <button onclick="window.open('${p.streamUrl}', '_blank')">📺 Regarder</button>
              <button class="copy-btn" onclick="copyStreamUrl('${p.streamUrl}', this)">📋 Copier M3U</button>
            </div>`
          : `<div class="item-actions"><button class="no-stream" disabled>🔒 Stream indisponible</button></div>`;
        
        html += `<div class="item erotica">
          <div class="item-header">
            <span class="item-flag">${p.flag}</span>
            <div class="item-info">
              <div class="item-country">${p.countryName}</div>
              <div class="item-title">${p.title}</div>
              <div class="item-channel">${p.channelIcon || '📺'} ${p.channel}</div>
              <div class="item-time">${time}</div>
              <span class="item-badge">EN DIRECT</span>
              ${streamActions}
            </div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }
  
  if (state.filter === "all" || state.filter === "worldcup") {
    html += `<h2>⚽ Coupe du Monde 2026 — EN DIRECT</h2>
      <p class="subtitle"><strong>${worldcup.length}</strong> match(s) maintenant</p>`;
    
    if (!worldcup.length) {
      html += `<div class="state">Aucun match en ce moment</div>`;
    } else {
      html += `<div class="items">`;
      worldcup.forEach(p => {
        const time = new Date(p.start).toLocaleTimeString("fr-FR", {hour: "2-digit", minute: "2-digit"});
        const streamActions = p.streamUrl 
          ? `<div class="item-actions">
              <button onclick="window.open('${p.streamUrl}', '_blank')">📺 Regarder</button>
              <button class="copy-btn" onclick="copyStreamUrl('${p.streamUrl}', this)">📋 Copier M3U</button>
            </div>`
          : `<div class="item-actions"><button class="no-stream" disabled>🔒 Stream indisponible</button></div>`;
        
        html += `<div class="item worldcup">
          <div class="item-header">
            <span class="item-flag">${p.flag}</span>
            <div class="item-info">
              <div class="item-country">${p.countryName}</div>
              <div class="item-title">${p.title}</div>
              <div class="item-channel">${p.channelIcon || '📺'} ${p.channel}</div>
              <div class="item-time">${time}</div>
              <span class="item-badge">EN DIRECT</span>
              ${streamActions}
            </div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }
  
  document.getElementById("app").innerHTML = html;
}

function setFilter(type) {
  state.filter = type;
  renderResults();
}

function goBack() {
  state.stage = "select";
  state.filter = "all";
  renderSelector();
}

function copyStreamUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const original = btn.textContent;
    btn.textContent = "✅ Copié !";
    btn.style.background = "var(--match)";
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = "";
    }, 2000);
  }).catch(() => {
    alert("URL: " + url);
  });
}

init();
</script>
</body>
</html>
